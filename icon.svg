  <ellipse cx="256" cy="382" rx="96" ry="16" fill="#e6b93a"/>
  <!-- taza -->
  <path d="M150 250 q0 122 106 122 q106 0 106 -122 z" fill="url(#cup)" stroke="#2a1c10" stroke-width="8"/>
  <!-- banda roja -->
  <path d="M158 300 q98 30 196 0 l-9 34 q-89 26 -178 0 z" fill="#c0392b" stroke="#2a1c10" stroke-width="6"/>
  <!-- líquido -->
  <ellipse cx="256" cy="250" rx="106" ry="24" fill="#8a2da0" stroke="#2a1c10" stroke-width="8"/>
  <ellipse cx="252" cy="247" rx="86" ry="14" fill="#bd7ad8"/>
  <!-- pajita -->
  <path d="M304 146 l-30 100" stroke="#e8434f" stroke-width="16" stroke-linecap="round"/>
  <!-- nota musical -->
  <g stroke="#2a1c10" stroke-width="4">
    <rect x="372" y="150" width="7" height="54" fill="url(#gold)"/>
    <ellipse cx="362" cy="204" rx="16" ry="12" fill="url(#gold)"/>
  </g>
  <!-- cara -->
  <circle cx="222" cy="330" r="10" fill="#d87868" opacity=".55"/><circle cx="290" cy="330" r="10" fill="#d87868" opacity=".55"/>
  <circle cx="230" cy="316" r="16" fill="#fff" stroke="#2a1c10" stroke-width="5"/><circle cx="233" cy="318" r="8.5" fill="#2a1c10"/>
  <circle cx="282" cy="316" r="16" fill="#fff" stroke="#2a1c10" stroke-width="5"/><circle cx="285" cy="318" r="8.5" fill="#2a1c10"/>
  <path d="M234 346 q22 20 44 0" fill="none" stroke="#2a1c10" stroke-width="6" stroke-linecap="round"/>
  <!-- estrellas de esquina -->
  <g fill="url(#gold)">
    <path d="M92 92 l6 14 15 1 -11 10 4 15 -14 -8 -14 8 4 -15 -11 -10 15 -1 z"/>
    <path d="M420 92 l6 14 15 1 -11 10 4 15 -14 -8 -14 8 4 -15 -11 -10 15 -1 z"/>
