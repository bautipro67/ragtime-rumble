<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0" stop-color="#6e1622"/><stop offset=".6" stop-color="#3a0c14"/><stop offset="1" stop-color="#170406"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/><stop offset=".45" stop-color="#ffd24a"/><stop offset="1" stop-color="#b8860f"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf1d8"/><stop offset="1" stop-color="#e6d3a6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- rayos art-deco -->
  <g fill="#7c1a26" opacity=".5">
    <g id="ray"><path d="M256 256 L256 0 L296 0 Z"/></g>
    <use href="#ray" transform="rotate(30 256 256)"/><use href="#ray" transform="rotate(60 256 256)"/>
    <use href="#ray" transform="rotate(90 256 256)"/><use href="#ray" transform="rotate(120 256 256)"/>
    <use href="#ray" transform="rotate(150 256 256)"/><use href="#ray" transform="rotate(180 256 256)"/>
    <use href="#ray" transform="rotate(210 256 256)"/><use href="#ray" transform="rotate(240 256 256)"/>
    <use href="#ray" transform="rotate(270 256 256)"/><use href="#ray" transform="rotate(300 256 256)"/>
    <use href="#ray" transform="rotate(330 256 256)"/>
  </g>
  <!-- marco art-deco -->
  <rect x="42" y="42" width="428" height="428" rx="66" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <rect x="60" y="60" width="392" height="392" rx="52" fill="none" stroke="#7c1a26" stroke-width="3"/>
  <!-- platillo -->
